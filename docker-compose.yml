# docker-compose.yml
version: "3.8"

services:
  matrix-reg-bot:
    image: hiroshigaidao.cr.cloud.ru/matrix_py_admin_bot:1.0.0
    container_name: matrix-reg-bot
    restart: unless-stopped
    
    # Все переменные окружения прямо здесь
    environment:
      # Telegram
      - TG_BOT_TOKEN=
      - ADMIN_CHAT_ID=
      
      # Matrix Server
      - MATRIX_SERVER_URL=https://matrix.ru
      - MATRIX_DOMAIN=matrix.ru
      
      # Matrix Admin Bot
      - MATRIX_BOT_USER=login
      - MATRIX_BOT_PASSWORD=pass
      - MATRIX_ADMIN_ROOM_ID=ROOM
      
      # Paths
      - MATRIX_STORE_PATH=/app/matrix_store
      - DB_PATH=/app/data/bot_database.db
      - LOG_PATH=/app/logs
      - LOG_LEVEL=INFO
      - LOG_MAX_BYTES=10485760
      - LOG_BACKUP_COUNT=7
      
      # Python
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Moscow
    # Тома для сохранения данных
    volumes:
      - ./data:/app/data
      - ./matrix_store:/app/matrix_store
      - ./logs:/app/logs 
    
    # Ограничения ресурсов
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M